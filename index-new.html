<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 GitHub AI Trending - 技术风向标</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0B0F19;
            --bg-secondary: #111827;
            --bg-card: #1A2332;
            --bg-card-hover: #243045;
            --text-primary: #F9FAFB;
            --text-secondary: #D1D5DB;
            --text-tertiary: #9CA3AF;
            --text-muted: #6B7280;
            --accent-primary: #3B82F6;
            --accent-secondary: #8B5CF6;
            --accent-success: #10B981;
            --accent-warning: #F59E0B;
            --accent-danger: #EF4444;
            --accent-gradient: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            --border-color: #1F2937;
            --border-light: #374151;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: radial-gradient(ellipse at top, rgba(59, 130, 246, 0.08) 0%, transparent 50%), radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: var(--spacing-2xl) var(--spacing-lg); }
        
        /* Header */
        .header { margin-bottom: var(--spacing-2xl); }
        .logo { display: flex; align-items: center; gap: var(--spacing-lg); margin-bottom: var(--spacing-sm); }
        .logo-icon {
            width: 56px; height: 56px;
            background: var(--accent-gradient);
            border-radius: var(--radius-xl);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .subtitle { 
            color: var(--text-secondary); 
            font-size: 1.125rem;
            max-width: 600px;
        }
        
        /* Tabs */
        .tabs { display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-xl); border-bottom: 1px solid var(--border-color); padding-bottom: var(--spacing-md); }
        .tab {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }
        .tab:hover { border-color: var(--accent-primary); color: var(--text-primary); background: var(--bg-card-hover); }
        .tab.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        
        /* Stats Grid */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--spacing-lg); margin-bottom: var(--spacing-2xl); }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            text-align: center;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .stat-card:hover { 
            transform: translateY(-4px); 
            border-color: var(--accent-primary); 
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
        }
        .stat-card:hover::before { opacity: 1; }
        .stat-value {
            font-size: 2.75rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Outfit', sans-serif;
            line-height: 1;
            margin-bottom: var(--spacing-sm);
        }
        .stat-label { 
            color: var(--text-secondary); 
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stat-trend {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            margin-top: var(--spacing-sm);
            font-size: 0.8125rem;
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-full);
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
        }
        .stat-trend.down { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); }
        
        /* Tech Insights Banner */
        .tech-insights {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-2xl);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-2xl);
            position: relative;
            overflow: hidden;
        }
        .tech-insights::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--accent-gradient);
        }
        .tech-insights h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .insight-tags { display: flex; flex-wrap: wrap; gap: var(--spacing-sm); }
        .insight-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .insight-tag:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
            transform: translateY(-2px);
        }
        .insight-tag.hot { border-color: var(--accent-warning); color: var(--accent-warning); background: rgba(245, 158, 11, 0.1); }
        .insight-tag.new { border-color: var(--accent-success); color: var(--accent-success); background: rgba(16, 185, 129, 0.1); }
        
        /* Report Sections */
        .report-section { margin-bottom: var(--spacing-2xl); }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .section-header h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: var(--radius-sm);
        }
        .view-all {
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .view-all:hover { color: var(--accent-secondary); text-decoration: underline; }
        
        .report-list {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--spacing-sm);
        }
        .report-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-sm);
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .report-item:last-child { margin-bottom: 0; }
        .report-item:hover { 
            border-color: var(--accent-primary); 
            transform: translateX(8px);
            background: var(--bg-card-hover);
        }
        .report-content { flex: 1; }
        .report-date { 
            font-weight: 600; 
            color: var(--text-primary); 
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9375rem;
            margin-bottom: var(--spacing-xs);
        }
        .report-title { 
            color: var(--text-secondary); 
            font-size: 0.875rem;
        }
        .report-meta {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-top: var(--spacing-sm);
        }
        .report-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(59, 130, 246, 0.1);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            color: var(--accent-primary);
            font-weight: 500;
        }
        .report-tag.hot { background: rgba(245, 158, 11, 0.1); color: var(--accent-warning); }
        .report-tag.new { background: rgba(16, 185, 129, 0.1); color: var(--accent-success); }
        .report-arrow { 
            color: var(--accent-primary); 
            font-size: 1.25rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.2s;
        }
        .report-item:hover .report-arrow { opacity: 1; transform: translateX(0); }
        
        /* Loading State */
        .loading {
            padding: var(--spacing-2xl);
            text-align: center;
            color: var(--text-secondary);
        }
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: var(--spacing-md);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Footer */
        .footer {
            text-align: center;
            margin-top: var(--spacing-2xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: var(--spacing-lg) var(--spacing-md); }
            h1 { font-size: 1.75rem; }
            .logo-icon { width: 48px; height: 48px; font-size: 24px; }
            .stats { grid-template-columns: repeat(2, 1fr); gap: var(--spacing-md); }
            .stat-value { font-size: 2rem; }
            .tabs { overflow-x: auto; padding-bottom: var(--spacing-sm); }
            .report-item { flex-direction: column; align-items: flex-start; gap: var(--spacing-sm); }
            .report-arrow { display: none; }
            .tech-insights { padding: var(--spacing-md); }
            .insight-tags { gap: var(--spacing-xs); }
            .insight-tag { font-size: 0.8125rem; padding: var(--spacing-xs) var(--spacing-sm); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🚀</div>
                <h1>GitHub AI Trending</h1>
            </div>
            <p class="subtitle">追踪技术前沿，发现优质项目 · 每日自动更新</p>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <a href="./" class="tab active">📰 日报</a>
            <a href="./reports/weekly/index.html" class="tab">📚 周报</a>
            <a href="./reports/monthly/index.html" class="tab">📊 月报</a>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalReports">-</div>
                <div class="stat-label">报告总数</div>
                <div class="stat-trend">↑ 本周 +3</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="dailyCount">-</div>
                <div class="stat-label">日报</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="weeklyCount">-</div>
                <div class="stat-label">周报</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalProjects">-</div>
                <div class="stat-label">收录项目</div>
            </div>
        </div>
        
        <!-- Tech Insights Banner -->
        <div class="tech-insights">
            <h2>🔥 本周技术风向</h2>
            <div class="insight-tags" id="techTags">
                <span class="insight-tag hot">🔥 AI Agent 框架</span>
                <span class="insight-tag hot">⚡ 自托管基建</span>
                <span class="insight-tag new">🆕 多智能体协作</span>
                <span class="insight-tag">🛡️ 安全沙盒</span>
                <span class="insight-tag">📊 向量数据库</span>
            </div>
        </div>
        
        <!-- Daily Reports -->
        <div class="report-section">
            <div class="section-header">
                <h2>📰 最新日报</h2>
                <a href="./reports/daily/index.html" class="view-all">查看全部 →</a>
            </div>
            <div class="report-list" id="dailyList">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在加载最新日报...</div>
                </div>
            </div>
        </div>
        
        <!-- Weekly Reports -->
        <div class="report-section">
            <div class="section-header">
                <h2>📚 最新周报</h2>
                <a href="./reports/weekly/index.html" class="view-all">查看全部 →</a>
            </div>
            <div class="report-list" id="weeklyList">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在加载最新周报...</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>由 OpenClaw 自动生成 | 每日更新 | 数据来源：GitHub Trending API</p>
        </div>
    </div>
    
    <script>
        async function loadReports() {
            try {
                // Load daily reports
                const dailyResponse = await fetch('./reports/daily/index.html');
                if (dailyResponse.ok) {
                    const dailyHtml = await dailyResponse.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(dailyHtml, 'text/html');
                    const dailyItems = doc.querySelectorAll('.report-item');
                    const dailyList = document.getElementById('dailyList');
                    
                    if (dailyItems.length > 0) {
                        dailyList.innerHTML = Array.from(dailyItems).slice(0, 5).map((item, idx) => {
                            const href = item.getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || '#';
                            const date = item.querySelector('h3')?.textContent?.trim() || '未知日期';
                            const stars = item.querySelector('.report-stat strong')?.textContent?.trim() || '';
                            const tags = idx === 0 ? '<span class="report-tag hot">🔥 最新</span>' : idx < 3 ? '<span class="report-tag new">🆕 热门</span>' : '';
                            return `
                                <a href="./reports/daily/${href}" class="report-item">
                                    <div class="report-content">
                                        <div class="report-date">${date}</div>
                                        <div class="report-title">GitHub AI 项目每日简报 ${stars ? '(+' + stars + ' Stars)' : ''}</div>
                                        <div class="report-meta">${tags}</div>
                                    </div>
                                    <div class="report-arrow">→</div>
                                </a>
                            `;
                        }).join('');
                    }
                }
                
                // Load weekly reports
                const weeklyResponse = await fetch('./reports/weekly/index.html');
                if (weeklyResponse.ok) {
                    const weeklyHtml = await weeklyResponse.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(dailyHtml, 'text/html');
                    const weeklyItems = doc.querySelectorAll('.report-item');
                    const weeklyList = document.getElementById('weeklyList');
                    
                    if (weeklyItems.length > 0) {
                        weeklyList.innerHTML = Array.from(weeklyItems).slice(0, 3).map((item, idx) => {
                            const href = item.getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || '#';
                            const date = item.querySelector('h3')?.textContent?.trim() || item.querySelector('.report-meta p')?.textContent?.trim() || '未知日期';
                            const projects = item.querySelectorAll('.report-stat')[1]?.textContent?.trim() || '';
                            const tag = idx === 0 ? '<span class="report-tag hot">🔥 本周</span>' : '';
                            return `
                                <a href="./reports/weekly/${href}" class="report-item">
                                    <div class="report-content">
                                        <div class="report-date">${date}</div>
                                        <div class="report-title">GitHub 周报 ${projects ? '(' + projects + ')' : ''}</div>
                                        <div class="report-meta">${tag}</div>
                                    </div>
                                    <div class="report-arrow">→</div>
                                </a>
                            `;
                        }).join('');
                    }
                }
                
                // Update stats
                document.getElementById('dailyCount').textContent = '7';
                document.getElementById('weeklyCount').textContent = '1';
                document.getElementById('totalReports').textContent = '8';
                document.getElementById('totalProjects').textContent = '22';
            } catch (e) {
                console.error('加载失败:', e);
            }
        }
        
        loadReports();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub AI 月度趋势报告 - 2026-03</title>
  <link rel="stylesheet" href="../../public/css/style.css">
  <link rel="stylesheet" href="../../public/css/monthly.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container monthly-report">
    
      <header class="monthly-header">
        <h1>GitHub AI 月度趋势报告</h1>
        <div class="month">2026-03</div>
        <div class="subtitle">深度分析 · 趋势洞察 · 生态全景</div>
      </header>
    
    
      <section class="monthly-overview">
        <h2>月度概览</h2>
        <div class="stats-grid">
          
            <div class="stat-card">
              <div class="stat-value">0</div>
              <div class="stat-label">总项目数</div>
              <div class="stat-detail">去重后</div>
            </div>
          
            <div class="stat-card">
              <div class="stat-value">0</div>
              <div class="stat-label">重复上榜</div>
              <div class="stat-detail">≥2 次</div>
            </div>
          
            <div class="stat-card">
              <div class="stat-value">0</div>
              <div class="stat-label">月度新星</div>
              <div class="stat-detail">首次出现</div>
            </div>
          
            <div class="stat-card">
              <div class="stat-value">0</div>
              <div class="stat-label">AI 项目</div>
              <div class="stat-detail">含 Agent/LLM 等</div>
            </div>
          
        </div>
      </section>
    
    
    
    
      <section class="data-visualization">
        <h2>数据可视化</h2>
        <div class="charts-grid">
          <div class="chart-container">
            <h4 class="chart-title">领域分布</h4>
            
      <canvas id="typeChart"></canvas>
      <script>
        (function() {
          const ctx = document.getElementById('typeChart');
          if (!ctx) return;

          new Chart(ctx, {
            type: 'pie',
            data: {
              labels: [],
              datasets: [{
                data: [],
                backgroundColor: ["rgba(102, 126, 234, 0.8)","rgba(118, 75, 162, 0.8)","rgba(240, 147, 251, 0.8)","rgba(245, 175, 255, 0.8)","rgba(147, 197, 253, 0.8)","rgba(111, 207, 151, 0.8)","rgba(134, 239, 172, 0.8)","rgba(253, 224, 71, 0.8)","rgba(251, 191, 36, 0.8)","rgba(251, 146, 60, 0.8)"],
                borderWidth: 2,
                borderColor: '#fff'
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: {
                    padding: 15,
                    font: { size: 12 }
                  }
                },
                title: {
                  display: false,
                  text: '',
                  font: { size: 16, weight: 'bold' }
                }
              }
            }
          });
        })();
      </script>
    
          </div>
          <div class="chart-container">
            <h4 class="chart-title">语言分布 TOP5</h4>
            
      <canvas id="languageChart"></canvas>
      <script>
        (function() {
          const ctx = document.getElementById('languageChart');
          if (!ctx) return;

          new Chart(ctx, {
            type: 'bar',
            data: {
              labels: [],
              datasets: [{
                label: '项目数量',
                data: [],
                backgroundColor: ["rgba(102, 126, 234, 0.8)","rgba(118, 75, 162, 0.8)","rgba(240, 147, 251, 0.8)","rgba(245, 175, 255, 0.8)","rgba(147, 197, 253, 0.8)","rgba(111, 207, 151, 0.8)","rgba(134, 239, 172, 0.8)","rgba(253, 224, 71, 0.8)","rgba(251, 191, 36, 0.8)","rgba(251, 146, 60, 0.8)"],
                borderWidth: 1,
                borderRadius: 4
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  display: false
                },
                title: {
                  display: false,
                  text: '',
                  font: { size: 16, weight: 'bold' }
                }
              },
              scales: {
                y: {
                  beginAtZero: true,
                  ticks: {
                    stepSize: 1
                  }
                },
                x: {
                  ticks: {
                    maxRotation: 45,
                    minRotation: 45
                  }
                }
              }
            }
          });
        })();
      </script>
    
          </div>
        </div>
      </section>
    
    
    
    
    
    
    
      <section class="full-project-list">
        <h2>完整项目列表</h2>
        
      </section>
    
  </div>
</body>
</html>

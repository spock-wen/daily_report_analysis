<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试页面</title>
  <link rel="stylesheet" href="public/css/index.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>测试页面</h1>
      <p class="subtitle">测试基本样式是否正常</p>
    </header>
    <section class="system-status">
      <h2 class="sr-only">系统状态</h2>
      <div class="status-grid">
        <div class="stat-card">
          <div class="stat-value">测试</div>
          <div class="stat-label">测试卡片</div>
          <div class="stat-detail">测试内容</div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
